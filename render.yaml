services:
  - type: web
    name: gyaanbd-api
    runtime: docker
    plan: free # Change to a paid plan ('starter', 'standard') for production
    region: singapore # Change based on your primary target audience
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # Set this manually in Render Dashboard!
      - key: JWT_SECRET
        sync: false # Set this manually in Render Dashboard!
      - key: ALLOWED_ORIGINS
        value: '*' # Or restrict to your frontend URL
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
